<script type="text/babel">
const{useState,useEffect}=React;
const PRIMARY="#0F6E56",MGR="#1A237E";
const CATS={clinic:{l:"診所",c:"#991B1B",bg:"#FEF2F2"},hotel:{l:"旅館",c:"#92400E",bg:"#FFFBEB"},grooming:{l:"美容",c:"#5B21B6",bg:"#F5F3FF"},rehab:{l:"復健/泳池",c:"#075985",bg:"#F0F9FF"},cleaning:{l:"清潔",c:"#065F46",bg:"#ECFDF5"},admin:{l:"行政",c:"#374151",bg:"#F9FAFB"}};
const ST={pending:{l:"待確認",c:"#92400E",dot:"#F59E0B"},confirmed:{l:"執行中",c:"#1E40AF",dot:"#3B82F6"},completed:{l:"已完成",c:"#065F46",dot:"#10B981"},overdue:{l:"逾時",c:"#991B1B",dot:"#EF4444"}};
const DAY_TW=["日","一","二","三","四","五","六"];
const ASSIGN_OPTS=[{v:"shift_day",l:"早班全體"},{v:"shift_night",l:"晚班全體"},{v:"duty_day",l:"早班值日生"},{v:"duty_night",l:"晚班值日生"},{v:"person",l:"指定員工"},{v:"all",l:"所有人"}];

const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtDt=ts=>ts?new Date(ts).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
const fmtMin=ms=>{if(!ms||ms<0)return"—";const m=Math.round(ms/60000);return m<60?m+"分":Math.floor(m/60)+"時"+(m%60?m%60+"分":"");};
const fmtDate=d=>{const dt=new Date(d+"T00:00:00");return`${dt.getMonth()+1}/${dt.getDate()}（${DAY_TW[dt.getDay()]}）`;};

function calcStatus(t){
  if(!t)return"pending";
  if(t.status==="completed"||t.overdueOverride)return"completed";
  if(!t.deadline)return t.status||"pending";
  const td=t.taskDate||t.date||todayKey();
  const[h,m]=t.deadline.split(":").map(Number);
  const dl=new Date(td+"T00:00:00");dl.setHours(h,m,0,0);
  return new Date()>dl?"overdue":(t.status||"pending");
}
const isOC=t=>t&&t.overdueCompleted===true&&!t.overdueOverride;
const isMA=t=>t&&!!t.overdueOverride;

function calcStats(tasks,uid){
  const mine=tasks.filter(t=>t.assignedUids&&t.assignedUids[uid]);
  const total=mine.length;
  if(!total)return{total:0,completed:0,overdueCompleted:0,managerApproved:0,completionRate:0,overdueRate:0,avgTime:null};
  const done=mine.filter(t=>t.status==="completed"||t.overdueOverride);
  const oc=mine.filter(isOC);const ma=mine.filter(isMA);
  const times=done.filter(t=>t.completedAt&&t.createdAt).map(t=>t.completedAt-t.createdAt);
  return{total,completed:done.length,overdueCompleted:oc.length,managerApproved:ma.length,
    completionRate:Math.round(done.length/total*100),
    overdueRate:done.length?Math.round(oc.length/done.length*100):0,
    avgTime:times.length?times.reduce((a,b)=>a+b,0)/times.length:null};
}

function getDates(s,e){const d=[];let c=new Date(s+"T00:00:00");const ed=new Date(e+"T00:00:00");while(c<=ed){d.push(c.toISOString().slice(0,10));c.setDate(c.getDate()+1);}return d;}
function getWeekDates(off=0){const d=new Date();d.setDate(d.getDate()+off*7);const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-dow+(dow===0?-6:1));return Array.from({length:7},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd.toISOString().slice(0,10);});}
function getFutureDates(n=15){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10);});}

const dbGet=p=>db.ref(p).once("value").then(s=>s.val());
const dbSet=(p,v)=>db.ref(p).set(v);
const dbUpd=(p,v)=>db.ref(p).update(v);
const dbPush=(p,v)=>db.ref(p).push(v);
const dbDel=p=>db.ref(p).remove();

async function loadRange(s,e){
  const dates=getDates(s,e);
  const res=await Promise.all(dates.map(d=>dbGet("tasks/"+d)));
  const all=[];res.forEach((day,i)=>{if(day)Object.entries(day).forEach(([id,t])=>all.push({...t,id,date:dates[i]}));});
  return all;
}

function SchedBar({sched,uid}){

      </div>
      <div><div style={{fontSize:12,color:MGR,fontWeight:600,marginBottom:4}}>晚班</div>
        {nm.length?nm.map(n=><div key={n} style={{fontSize:13,color:"#374151",display:"flex",alignItems:"center",gap:4,marginBottom:2}}>{n}{sched.night?.dutyOfficerName===n&&<span style={{fontSize:10,fontWeight:700,background:MGR,color:"#fff",borderRadius:4,padding:"1px 5px"}}>值</span>}</div>):<div style={{fontSize:12,color:"#9CA3AF"}}>未排班</div>}
      </div>

    {(isD||isN)&&<div style={{marginTop:10,paddingTop:10,borderTop:"0.5px solid #F3F4F6",display:"flex",gap:6,flexWrap:"wrap"}}>

// ── Task Card ──
function TaskCard({task,currentUser,isManager,onConfirm,onComplete,onOverride}){
  const[open,setOpen]=useState(false);const[orMode,setOrMode]=useState(false);const[reason,setReason]=useState("");
  const st=calcStatus(task);const td=task.taskDate||task.date||todayKey();
  const isOwn=task.assignedUids&&!!task.assignedUids[currentUser?.uid];const canAct=isOwn||isManager;
  const isFuture=td>todayKey();
  return<div style={{background:"#fff",border:"0.5px solid "+(st==="overdue"?"#FECACA":"#E5E7EB"),borderLeft:"3px solid "+(ST[st]?.dot||"#9CA3AF"),borderRadius:10,marginBottom:10,overflow:"hidden"}}>
    <div style={{padding:"12px 14px",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,flexWrap:"wrap"}}>
            <Badge cat={task.category}/>
            {task.priority==="urgent"&&<Pill label="緊急" color="#991B1B" bg="#FEF2F2"/>}
            <SDot status={st}/>
            {isOC(task)&&<Pill label="⚠️ 逾時後完成" color="#92400E" bg="#FFFBEB"/>}
            {isMA(task)&&<Pill label="主管已核准" color="#1B5E20" bg="#E8F5E9"/>}
            {isFuture&&<Pill label={fmtDate(td)} color="#075985" bg="#F0F9FF"/>}
          </div>
          <div style={{fontSize:15,fontWeight:500,color:"#111",lineHeight:1.4}}>{task.title}</div>
          <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#9CA3AF"}}>指派：{task.assignLabel}</span>
            {task.deadline&&<span style={{fontSize:12,color:st==="overdue"?"#991B1B":"#9CA3AF",fontWeight:st==="overdue"?600:400}}>截止 {task.deadline}</span>}
          </div>
        </div>
        <span style={{fontSize:11,color:"#9CA3AF",flexShrink:0}}>{open?"▲":"▼"}</span>
      </div>
    </div>
    {open&&<div style={{padding:"0 14px 14px",borderTop:"0.5px solid #F3F4F6"}}>
      {task.detail&&<p style={{fontSize:14,color:"#4B5563",margin:"10px 0",lineHeight:1.65}}>{task.detail}</p>}
      <div style={{fontSize:12,color:"#9CA3AF",display:"flex",flexDirection:"column",gap:3,marginBottom:12}}>
        <span>建立：{task.createdByName} · {fmtDt(task.createdAt)}</span>
        {task.confirmedByName&&<span>確認：{task.confirmedByName} · {fmtDt(task.confirmedAt)}</span>}
        {task.completedByName&&<span style={{color:isOC(task)?"#92400E":"#065F46",fontWeight:500}}>{isOC(task)?"⚠️ 逾時後完成":"完成"}：{task.completedByName} · {fmtDt(task.completedAt)}</span>}
        {task.overdueOverride&&<span style={{color:"#1B5E20"}}>核准：{task.overdueOverride.byName} — {task.overdueOverride.reason}</span>}
      </div>
      {!isFuture&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {canAct&&onConfirm&&(task.status==="pending"||!task.status)&&<button onClick={()=>onConfirm(task.id,task)} style={{flex:1,padding:"10px",background:"#1E40AF",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,minWidth:90}}>確認收到</button>}
        {canAct&&onComplete&&task.status==="confirmed"&&<button onClick={()=>onComplete(task.id,task)} style={{flex:1,padding:"10px",background:"#065F46",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,minWidth:90}}>標記完成</button>}
        {isManager&&st==="overdue"&&onOverride&&!orMode&&<button onClick={()=>setOrMode(true)} style={{padding:"10px 14px",background:"#FEF3C7",color:"#92400E",border:"0.5px solid #FDE68A",borderRadius:8,fontSize:13}}>核准逾時</button>}
      </div>}
      {isFuture&&<div style={{padding:"8px 12px",background:"#F0F9FF",borderRadius:8,fontSize:13,color:"#075985"}}>此任務排定於 {fmtDate(td)} 執行</div>}
      {orMode&&<div style={{marginTop:10,background:"#FFFDE7",border:"0.5px solid #FDE68A",borderRadius:8,padding:12}}>
        <div style={{fontSize:13,fontWeight:500,color:"#92400E",marginBottom:8}}>核准原因（核准後不計入逾時比例）</div>
        <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={2} style={{width:"100%",padding:"8px",border:"0.5px solid #FDE68A",borderRadius:6,fontSize:13,background:"#fff"}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>{setOrMode(false);setReason("");}} style={{flex:1,padding:"8px",border:"0.5px solid #D1D5DB",borderRadius:6,background:"#fff",color:"#6B7280",fontSize:13}}>取消</button>
          <button onClick={()=>{if(!reason.trim()){alert("請填寫原因");return;}onOverride(task.id,task,reason);setOrMode(false);setReason("");}} style={{flex:2,padding:"8px",border:"none",borderRadius:6,background:"#D97706",color:"#fff",fontSize:13,fontWeight:500}}>確認核准</button>
        </div>
      </div>}
    </div>}
  </div>;
}

          </div>
        </div>;

}

// ── Stats View ──
function StatsView({isManager,currentUser,allUsers}){
  const[start,setStart]=useState(()=>{const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().slice(0,10);});
  const[end,setEnd]=useState(todayKey);
  const[tasks,setTasks]=useState([]);const[loading,setLoading]=useState(false);const[selUid,setSelUid]=useState(isManager?"all":currentUser.uid);
  const staff=Object.values(allUsers||{}).filter(u=>u.role!=="manager"&&u.active!==false);
  const load=async()=>{if(start>end){alert("開始日期不能晚於結束日期");return;}setLoading(true);const t=await loadRange(start,end);setTasks(t);setLoading(false);};
  useEffect(()=>{load();},[]);
  const teamStats=staff.map(u=>({...u,...calcStats(tasks,u.uid)}));
  const teamAvg=teamStats.length?Math.round(teamStats.reduce((a,s)=>a+s.completionRate,0)/teamStats.length):0;
  const RB=({rate,color})=><div style={{background:"#F3F4F6",borderRadius:4,height:8,overflow:"hidden",marginTop:4}}><div style={{height:"100%",width:Math.min(rate,100)+"%",background:color||PRIMARY,borderRadius:4}}/></div>;
  const displayList=selUid==="all"?teamStats:[teamStats.find(u=>u.uid===selUid)||{...currentUser,...calcStats(tasks,currentUser.uid)}].filter(Boolean);
  return<div>
    <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:16}}>{isManager?"統計分析":"我的統計"}</div>
    <div style={{background:"#fff",border:"0.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:500,color:"#6B7280",marginBottom:10}}>選擇時間範圍</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>開始</div><input type="date" value={start} onChange={e=>setStart(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff"}}/></div>
        <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>結束</div><input type="date" value={end} onChange={e=>setEnd(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff"}}/></div>
      </div>
      <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
        {[["7天",7],["14天",14],["30天",30]].map(([l,n])=><button key={n} onClick={()=>{const d=new Date();d.setDate(d.getDate()-(n-1));setStart(d.toISOString().slice(0,10));setEnd(todayKey());}} style={{padding:"6px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#F9FAFB",color:"#374151",fontSize:13}}>{l}</button>)}
        <button onClick={load} disabled={loading} style={{flex:1,padding:"6px 14px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:600}}>{loading?"載入中...":"查詢"}</button>
      </div>
    </div>
    {isManager&&<div style={{marginBottom:14}}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      <button onClick={()=>setSelUid("all")} style={{padding:"7px 14px",border:"1.5px solid "+(selUid==="all"?MGR:"#E5E7EB"),borderRadius:20,background:selUid==="all"?"#E8EAF6":"#fff",color:selUid==="all"?MGR:"#6B7280",fontSize:13,fontWeight:selUid==="all"?600:400}}>全員對比</button>
      {staff.map(u=><button key={u.uid} onClick={()=>setSelUid(u.uid)} style={{padding:"7px 14px",border:"1.5px solid "+(selUid===u.uid?PRIMARY:"#E5E7EB"),borderRadius:20,background:selUid===u.uid?"#ECFDF5":"#fff",color:selUid===u.uid?PRIMARY:"#6B7280",fontSize:13,fontWeight:selUid===u.uid?600:400}}>{u.name}</button>)}
    </div></div>}
    {!loading&&tasks.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9CA3AF",fontSize:14}}>此時間段無任務記錄</div>}
    {isManager&&selUid==="all"&&tasks.length>0&&<><div style={{fontSize:13,fontWeight:600,color:"#9CA3AF",marginBottom:8}}>團隊整體</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <SC label="總任務數" value={tasks.length}/>
        <SC label="團隊平均完成率" value={teamAvg+"%"} color={teamAvg>=80?PRIMARY:teamAvg>=60?"#D97706":"#991B1B"}/>
        <SC label="逾時後完成（計入）" value={tasks.filter(isOC).length} color="#D97706"/>
        <SC label="主管核准（不計入）" value={tasks.filter(isMA).length} color="#065F46"/>
      </div>
    </>}
    {tasks.length>0&&<div>
      {displayList.map(s=>{
        const isMe=s.uid===currentUser.uid;const cr=s.completionRate||0;const or=s.overdueRate||0;
        return<div key={s.uid||"me"} style={{background:"#fff",border:"0.5px solid "+(isMe?"#A7F3D0":"#E5E7EB"),borderRadius:10,padding:"14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:15,fontWeight:600,color:"#111"}}>{s.name}{isMe&&<span style={{fontSize:11,background:"#ECFDF5",color:PRIMARY,borderRadius:4,padding:"2px 6px",marginLeft:6}}>我</span>}</div>
            <div style={{fontSize:24,fontWeight:700,color:cr>=80?PRIMARY:cr>=60?"#D97706":"#991B1B"}}>{cr}%</div>
          </div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:3}}>任務完成率</div>
          <RB rate={cr} color={cr>=80?PRIMARY:cr>=60?"#D97706":"#991B1B"}/>
          {isManager&&teamAvg>0&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:3,textAlign:"right"}}>團隊平均 {teamAvg}%</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>指派總數</div><div style={{fontSize:18,fontWeight:600}}>{s.total}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>完成數</div><div style={{fontSize:18,fontWeight:600,color:PRIMARY}}>{s.completed}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>逾時後完成</div><div style={{fontSize:18,fontWeight:600,color:or>0?"#D97706":"#9CA3AF"}}>{s.overdueCompleted}</div></div>
          </div>
          {s.completed>0&&<div style={{marginTop:10,background:"#FFFBEB",borderRadius:8,padding:"8px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:12,color:"#92400E",fontWeight:500}}>逾時後完成比例（計入）</span>
              <span style={{fontSize:14,fontWeight:700,color:or>20?"#991B1B":or>10?"#D97706":"#065F46"}}>{or}%</span>
            </div>
            <div style={{fontSize:11,color:"#9CA3AF"}}>{s.overdueCompleted} 筆 / {s.completed} 筆完成總數</div>
            <RB rate={or} color={or>20?"#EF4444":or>10?"#F59E0B":"#10B981"}/>
          </div>}
          {(s.managerApproved||0)>0&&<div style={{marginTop:8,background:"#ECFDF5",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#065F46"}}>主管核准（不計入）</span>
            <span style={{fontSize:14,fontWeight:600,color:"#065F46"}}>{s.managerApproved} 筆</span>
          </div>}
          <div style={{marginTop:10,paddingTop:10,borderTop:"0.5px solid #F3F4F6",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#9CA3AF"}}>平均完成時間</span>
            <span style={{fontSize:13,fontWeight:500,color:"#1E40AF"}}>{fmtMin(s.avgTime)}</span>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

// ── Template Manager ──
function TmplMgr({currentUser,onUse}){
  const[tmpls,setTmpls]=useState([]);const[showAdd,setShowAdd]=useState(false);const[showImp,setShowImp]=useState(false);
  const[form,setForm]=useState({title:"",detail:"",category:"clinic",priority:"normal",deadline:""});
  const[impText,setImpText]=useState("");const[importing,setImporting]=useState(false);
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  useEffect(()=>{const ref=db.ref("templates");ref.on("value",snap=>{const v=snap.val();setTmpls(v?Object.entries(v).map(([id,d])=>({...d,id})).sort((a,b)=>a.title.localeCompare(b.title,"zh-TW")):[]); });return()=>ref.off();},[]);
  const saveT=async()=>{if(!form.title.trim()){alert("請填寫名稱");return;}await dbPush("templates",{...form,deadline:form.deadline||null,createdBy:currentUser.uid,createdByName:currentUser.name,createdAt:Date.now()});setForm({title:"",detail:"",category:"clinic",priority:"normal",deadline:""});setShowAdd(false);};
  const delT=async id=>{if(!confirm("確定刪除？"))return;await dbDel("templates/"+id);};
  const doImp=async()=>{
    const lines=impText.trim().split("\n").filter(l=>l.trim());if(!lines.length){alert("請先貼上資料");return;}setImporting(true);let cnt=0;
    const cm={"診所":"clinic","旅館":"hotel","美容":"grooming","復健":"rehab","泳池":"rehab","復健/泳池":"rehab","清潔":"cleaning","行政":"admin"};
    for(const line of lines){const p=line.split("\t");if(!p[0]?.trim())continue;await dbPush("templates",{title:p[0].trim(),category:cm[(p[1]||"").trim()]||"admin",priority:(p[2]||"").trim()==="緊急"?"urgent":"normal",deadline:(p[3]||"").trim()||null,detail:(p[4]||"").trim()||"",createdBy:currentUser.uid,createdByName:currentUser.name,createdAt:Date.now()});cnt++;}
    setImporting(false);setImpText("");setShowImp(false);alert("已匯入 "+cnt+" 筆範本！");
  };
  const inp={width:"100%",padding:"9px 12px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff",color:"#111"};
  const lbl={fontSize:12,fontWeight:500,color:"#6B7280",display:"block",marginBottom:5};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:17,fontWeight:600,color:"#111"}}>範本庫</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setShowImp(o=>!o);setShowAdd(false);}} style={{padding:"8px 12px",border:"1.5px solid "+(showImp?"#D97706":"#D1D5DB"),borderRadius:8,background:showImp?"#FFFBEB":"#fff",color:showImp?"#D97706":"#6B7280",fontSize:13}}>批次匯入</button>
        <button onClick={()=>{setShowAdd(o=>!o);setShowImp(false);}} style={{padding:"8px 12px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:500}}>+ 新增</button>
      </div>
    </div>
    {showImp&&<div style={{background:"#FFFBEB",border:"0.5px solid #FDE68A",borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:600,color:"#92400E",marginBottom:8}}>從 Google Sheets 批次匯入</div>
      <div style={{fontSize:12,color:"#92400E",marginBottom:10}}>格式（Tab分隔）：任務名稱 | 部門 | 優先 | 截止時間 | 說明</div>
      <textarea value={impText} onChange={e=>setImpText(e.target.value)} rows={5} style={{...inp,fontFamily:"monospace",fontSize:13,marginBottom:10}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setShowImp(false);setImpText("");}} style={{flex:1,padding:"9px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button>
        <button onClick={doImp} disabled={importing||!impText.trim()} style={{flex:2,padding:"9px",border:"none",borderRadius:8,background:"#D97706",color:"#fff",fontSize:14,fontWeight:600}}>{importing?"匯入中...":"確認匯入"}</button>
      </div>
    </div>}
    {showAdd&&<div style={{background:"#F9FAFB",border:"0.5px solid #E5E7EB",borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{marginBottom:10}}><label style={lbl}>範本名稱 *</label><input value={form.title} onChange={e=>up("title",e.target.value)} placeholder="例：住宿房間清潔" style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lbl}>詳細說明</label><textarea value={form.detail} onChange={e=>up("detail",e.target.value)} rows={2} style={{...inp,minHeight:60}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div><label style={lbl}>部門</label><select value={form.category} onChange={e=>up("category",e.target.value)} style={inp}>{Object.entries(CATS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>
        <div><label style={lbl}>優先</label><select value={form.priority} onChange={e=>up("priority",e.target.value)} style={inp}><option value="normal">一般</option><option value="urgent">緊急</option></select></div>
      </div>
      <div style={{marginBottom:12}}><label style={lbl}>預設截止（選填）</label><input type="time" value={form.deadline} onChange={e=>up("deadline",e.target.value)} style={{...inp,width:"auto"}}/></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:"9px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button>
        <button onClick={saveT} style={{flex:2,padding:"9px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:14,fontWeight:600}}>儲存</button>
      </div>
    </div>}
    {!tmpls.length&&!showAdd&&!showImp&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9CA3AF",fontSize:14}}>尚無範本</div>}
    {tmpls.map(t=><div key={t.id} style={{background:"#fff",border:"0.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",gap:6,marginBottom:5,flexWrap:"wrap"}}>
            <Badge cat={t.category}/>{t.priority==="urgent"&&<Pill label="緊急" color="#991B1B" bg="#FEF2F2"/>}
            {t.deadline&&<span style={{fontSize:11,color:"#9CA3AF",background:"#F3F4F6",borderRadius:8,padding:"2px 8px"}}>截止 {t.deadline}</span>}
          </div>
          <div style={{fontSize:14,fontWeight:500,color:"#111"}}>{t.title}</div>
          {t.detail&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{t.detail}</div>}
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {onUse&&<button onClick={()=>onUse(t)} style={{padding:"7px 12px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:500}}>使用</button>}
          <button onClick={()=>delT(t.id)} style={{padding:"7px 10px",border:"0.5px solid #FECACA",borderRadius:8,background:"#FEF2F2",color:"#991B1B",fontSize:13}}>刪</button>
        </div>
      </div>
    </div>)}
  </div>;
}

// ── Assign View (EXCLUDE_FROM_ALL applied to "all") ──
function AssignView({currentUser,allUsers,onDone}){
  const[form,setForm]=useState({title:"",detail:"",category:"clinic",priority:"normal",taskDate:todayKey(),deadline:"",assignType:"shift_day",personUid:""});
  const[sched,setSched]=useState(null);const[saving,setSaving]=useState(false);const[showT,setShowT]=useState(false);
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  useEffect(()=>{dbGet("schedules/"+todayKey()).then(s=>setSched(s));},[]);

  const resolve=()=>{
    const t=form.assignType,s=sched;
    if(t==="shift_day"){const u={};Object.entries(s?.day?.members||{}).forEach(([id])=>{u[id]=true;});return{uids:u,label:"早班全體（"+Object.values(s?.day?.members||{}).join("、")+"）"};}
    if(t==="shift_night"){const u={};Object.entries(s?.night?.members||{}).forEach(([id])=>{u[id]=true;});return{uids:u,label:"晚班全體（"+Object.values(s?.night?.members||{}).join("、")+"）"};}
    if(t==="duty_day"){const id=s?.day?.dutyOfficer;return{uids:id?{[id]:true}:{},label:"早班值日生（"+(s?.day?.dutyOfficerName||"未設定")+"）"};}
    if(t==="duty_night"){const id=s?.night?.dutyOfficer;return{uids:id?{[id]:true}:{},label:"晚班值日生（"+(s?.night?.dutyOfficerName||"未設定")+"）"};}
    if(t==="person"){const u=allUsers[form.personUid];return{uids:form.personUid?{[form.personUid]:true}:{},label:u?.name||"請選擇員工"};}
    if(t==="all"){
      const u={};
      Object.values(allUsers).filter(u2=>u2.active!==false&&!EXCLUDE_FROM_ALL.includes(u2.name)).forEach(u2=>{u[u2.uid]=true;});
      const excNote=EXCLUDE_FROM_ALL.length>0?"（排除："+EXCLUDE_FROM_ALL.join("、")+"）":"";
      return{uids:u,label:"所有員工"+excNote};
    }
    return{uids:{},label:""};
  };

  const submit=async()=>{
    if(!form.title.trim()){alert("請填寫標題");return;}
    const{uids,label}=resolve();
    if(!Object.keys(uids).length&&form.assignType!=="all"){alert("指派對象無人，請先設定排班");return;}
    setSaving(true);
    const key=await dbPush("tasks/"+form.taskDate,{
      title:form.title.trim(),detail:form.detail.trim(),category:form.category,priority:form.priority,
      deadline:form.deadline||null,taskDate:form.taskDate,assignType:form.assignType,assignLabel:label,
      assignedUids:uids,date:form.taskDate,createdBy:currentUser.uid,createdByName:currentUser.name,
      createdAt:Date.now(),status:"pending",confirmedBy:null,confirmedByName:null,confirmedAt:null,
      completedBy:null,completedByName:null,completedAt:null,overdueCompleted:false,overdueOverride:null
    });
    // 通知佇列：使用員工登入 Gmail (email 欄位)，無需員工另行設定
    await dbSet("notifications/"+key.key,{
      title:form.title.trim(),assignLabel:label,deadline:form.deadline||null,
      taskDate:form.taskDate,createdByName:currentUser.name,createdAt:Date.now(),
      sent:false,assignedUids:uids
    });
    setSaving(false);
    setForm({title:"",detail:"",category:"clinic",priority:"normal",taskDate:todayKey(),deadline:"",assignType:"shift_day",personUid:""});
    alert("任務已指派！");onDone&&onDone();
  };

  const{label:ap}=resolve();const isFut=form.taskDate>todayKey();
  const inp={width:"100%",padding:"10px 12px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:15,background:"#fff",color:"#111"};
  const lbl={fontSize:13,fontWeight:500,color:"#6B7280",display:"block",marginBottom:6};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:17,fontWeight:600,color:"#111"}}>指派任務</div>
      <button onClick={()=>setShowT(o=>!o)} style={{padding:"8px 12px",border:"1.5px solid "+(showT?PRIMARY:"#D1D5DB"),borderRadius:8,background:showT?"#ECFDF5":"#fff",color:showT?PRIMARY:"#6B7280",fontSize:13}}>📋 {showT?"關閉":"範本"}</button>
    </div>
    {showT&&<TmplMgr currentUser={currentUser} onUse={t=>{setForm(p=>({...p,title:t.title,detail:t.detail||"",category:t.category,priority:t.priority,deadline:t.deadline||""}));setShowT(false);}}/>}
    {!showT&&<>
      <div style={{marginBottom:14}}><span style={lbl}>部門</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {Object.entries(CATS).map(([k,v])=><button key={k} onClick={()=>up("category",k)} style={{padding:"9px 4px",border:"1.5px solid "+(form.category===k?v.c:"#E5E7EB"),borderRadius:8,background:form.category===k?v.bg:"#fff",color:form.category===k?v.c:"#6B7280",fontSize:13,fontWeight:form.category===k?600:400}}>{v.l}</button>)}
        </div>
      </div>
      <div style={{marginBottom:14}}><span style={lbl}>優先</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["normal","一般"],["urgent","緊急"]].map(([k,l])=><button key={k} onClick={()=>up("priority",k)} style={{padding:"10px",border:"1.5px solid "+(form.priority===k?(k==="urgent"?"#991B1B":PRIMARY):"#E5E7EB"),borderRadius:8,background:form.priority===k?(k==="urgent"?"#FEF2F2":"#ECFDF5"):"#fff",color:form.priority===k?(k==="urgent"?"#991B1B":PRIMARY):"#6B7280",fontSize:14,fontWeight:form.priority===k?600:400}}>{l}</button>)}
        </div>
      </div>
      <div style={{marginBottom:14}}><label style={lbl}>任務標題 *</label><input value={form.title} onChange={e=>up("title",e.target.value)} placeholder="請簡短說明" style={inp}/></div>
      <div style={{marginBottom:14}}><label style={lbl}>詳細說明</label><textarea value={form.detail} onChange={e=>up("detail",e.target.value)} rows={3} style={{...inp,minHeight:76}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={lbl}>執行日期</label><input type="date" value={form.taskDate} onChange={e=>up("taskDate",e.target.value)} min={todayKey()} style={inp}/></div>
        <div><label style={lbl}>截止時間（選填）</label><input type="time" value={form.deadline} onChange={e=>up("deadline",e.target.value)} style={inp}/></div>
      </div>
      {isFut&&<div style={{background:"#F0F9FF",border:"0.5px solid #BAE6FD",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:13,color:"#075985"}}>排定於 {fmtDate(form.taskDate)} 執行</div>}
      <div style={{marginBottom:20}}><span style={lbl}>指派對象</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {ASSIGN_OPTS.map(t=><button key={t.v} onClick={()=>up("assignType",t.v)} style={{padding:"10px",border:"1.5px solid "+(form.assignType===t.v?PRIMARY:"#E5E7EB"),borderRadius:8,background:form.assignType===t.v?"#ECFDF5":"#fff",color:form.assignType===t.v?PRIMARY:"#6B7280",fontSize:13,fontWeight:form.assignType===t.v?600:400}}>{t.l}{t.v==="all"&&EXCLUDE_FROM_ALL.length>0?" *":""}</button>)}
        </div>
        {form.assignType==="all"&&EXCLUDE_FROM_ALL.length>0&&<div style={{fontSize:12,color:"#9CA3AF",marginBottom:8}}>* 將自動排除：{EXCLUDE_FROM_ALL.join("、")}</div>}
        {form.assignType==="person"&&<select value={form.personUid} onChange={e=>up("personUid",e.target.value)} style={{...inp,marginBottom:8}}><option value="">請選擇員工</option>{Object.values(allUsers).filter(u=>u.active!==false).map(u=><option key={u.uid} value={u.uid}>{u.name}</option>)}</select>}
        {ap&&<div style={{padding:"8px 12px",background:"#F0F9FF",border:"0.5px solid #BAE6FD",borderRadius:8,fontSize:13,color:"#075985"}}>指派給：{ap}</div>}
      </div>
      <button onClick={submit} disabled={saving} style={{width:"100%",padding:"14px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:16,fontWeight:600}}>{saving?"指派中...":"確認指派任務"}</button>
    </>}
  </div>;
}

// ── Schedule Manager ──
function SchedMgr({allUsers}){
  const[weekOff,setWeekOff]=useState(0);const[editDay,setEditDay]=useState(null);const[sched,setSched]=useState({});
  const wd=getWeekDates(weekOff);const staff=Object.values(allUsers).filter(u=>u.active!==false);
  useEffect(()=>{Promise.all(wd.map(d=>dbGet("schedules/"+d).then(v=>[d,v]))).then(res=>{const m={};res.forEach(([d,v])=>{if(v)m[d]=v;});setSched(m);});},[weekOff]);
  const DE=({date})=>{
    const[day,setDay]=useState({members:{},dutyOfficer:null,dutyOfficerName:""});
    const[night,setNight]=useState({members:{},dutyOfficer:null,dutyOfficerName:""});
    const[saving,setSaving]=useState(false);
    useEffect(()=>{if(sched[date]?.day)setDay(sched[date].day);if(sched[date]?.night)setNight(sched[date].night);},[date]);
    const tog=(sh,uid,name)=>{const setter=sh==="day"?setDay:setNight;setter(p=>{const m={...p.members};if(m[uid]){delete m[uid];return{...p,members:m,dutyOfficer:p.dutyOfficer===uid?null:p.dutyOfficer,dutyOfficerName:p.dutyOfficer===uid?"":p.dutyOfficerName};}m[uid]=name;return{...p,members:m};});};
    const setD=(sh,uid,name)=>{const setter=sh==="day"?setDay:setNight;setter(p=>({...p,dutyOfficer:p.dutyOfficer===uid?null:uid,dutyOfficerName:p.dutyOfficer===uid?"":name}));};
    const save=async()=>{setSaving(true);const data={day,night};await dbSet("schedules/"+date,data);setSched(p=>({...p,[date]:data}));setSaving(false);setEditDay(null);};
    const SR=({sh,data,label,color})=><div style={{marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:600,color,marginBottom:8}}>{label}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {staff.map(u=>{const on=!!data.members[u.uid];return<button key={u.uid} onClick={()=>tog(sh,u.uid,u.name)} style={{padding:"7px 12px",border:"1.5px solid "+(on?color:"#E5E7EB"),borderRadius:20,background:on?"#ECFDF5":"#fff",color:on?color:"#6B7280",fontSize:13,fontWeight:on?600:400}}>{u.name}</button>;})}
      </div>
      {Object.keys(data.members).length>0&&<><div style={{fontSize:12,color:"#9CA3AF",marginBottom:6}}>值日生</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(data.members).map(([uid,name])=><button key={uid} onClick={()=>setD(sh,uid,name)} style={{padding:"7px 12px",border:"1.5px solid "+(data.dutyOfficer===uid?MGR:"#E5E7EB"),borderRadius:20,background:data.dutyOfficer===uid?"#E8EAF6":"#fff",color:data.dutyOfficer===uid?MGR:"#6B7280",fontSize:13,fontWeight:data.dutyOfficer===uid?600:400}}>{data.dutyOfficer===uid?"⭐ ":""}{name}</button>)}
        </div>
      </>}
    </div>;
    return<div style={{background:"#F9FAFB",border:"0.5px solid #E5E7EB",borderRadius:10,padding:14,marginTop:8}}>
      <SR sh="day" data={day} label="🌅 早班" color="#1565C0"/>
      <SR sh="night" data={night} label="🌙 晚班" color={MGR}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setEditDay(null)} style={{flex:1,padding:"10px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button>
        <button onClick={save} disabled={saving} style={{flex:2,padding:"10px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:14,fontWeight:600}}>{saving?"儲存中...":"儲存排班"}</button>
      </div>
    </div>;
  };
  return<div>
    <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:4}}>排班管理</div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>setWeekOff(o=>o-1)} style={{padding:"7px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#374151",fontSize:14}}>上週</button>
      <div style={{fontSize:13,color:"#6B7280"}}>{wd[0].slice(5).replace("-","/")} – {wd[6].slice(5).replace("-","/")}</div>
      <button onClick={()=>setWeekOff(o=>o+1)} style={{padding:"7px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#374151",fontSize:14}}>下週</button>
    </div>
    {wd.map(date=>{const d=sched[date];const isT=date===todayKey();return<div key={date} style={{marginBottom:8}}>
      <div style={{background:"#fff",border:"0.5px solid "+(isT?PRIMARY:"#E5E7EB"),borderRadius:10,overflow:"hidden"}}>
        <div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:isT?"#ECFDF5":"#fff",cursor:"pointer"}} onClick={()=>setEditDay(editDay===date?null:date)}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:isT?PRIMARY:"#111"}}>{isT?"📍 ":""}{fmtDate(date)}</div>
            <div style={{fontSize:12,color:"#9CA3AF",marginTop:2,display:"flex",gap:10}}>
              <span>🌅 {Object.values(d?.day?.members||{}).join("、")||"未排班"}{d?.day?.dutyOfficerName?" (值:"+d.day.dutyOfficerName+")":""}</span>
              <span>🌙 {Object.values(d?.night?.members||{}).join("、")||"未排班"}{d?.night?.dutyOfficerName?" (值:"+d.night.dutyOfficerName+")":""}</span>
            </div>
          </div>
          <span style={{fontSize:12,color:"#9CA3AF"}}>{editDay===date?"▲":"▼"}</span>
        </div>
        {editDay===date&&<div style={{padding:"0 12px 12px"}}><DE date={date}/></div>}
      </div>
    </div>;})}
  </div>;
}

function KioskView({label}){
  const[tasks,setTasks]=useState([]);const[users,setUsers]=useState({});const[sched,setSched]=useState(null);const[time,setTime]=useState(new Date());

        <GS title="執行中" tasks={conf} accent="#3B82F6" {...tp}/>
        <GS title="已完成" tasks={done} accent="#10B981" {...tp}/>
        {!tasks.length&&<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div style={{fontSize:15,fontWeight:500,color:"#374151"}}>今日尚無任務</div></div>}
      </div>}
      {tab==="assign"&&<AssignView currentUser={cu} allUsers={users} onDone={()=>setTab("today")}/>}
      {tab==="schedule"&&<SchedMgr allUsers={users}/>}
      {tab==="stats"&&<StatsView isManager={true} currentUser={cu} allUsers={users}/>}
      {tab==="future"&&<div>
        <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:4}}>未來排程</div>
        <div style={{fontSize:13,color:"#9CA3AF",marginBottom:14}}>未來 14 天內的所有已指派任務</div>
        {futureT.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>📅</div><div style={{fontSize:15,fontWeight:500,color:"#374151"}}>未來 14 天無排定任務</div></div>}
        {futureT.length>0&&(()=>{
          const grp={};futureT.forEach(t=>{const d=t.taskDate||t.date;if(!grp[d])grp[d]=[];grp[d].push(t);});
          return Object.entries(grp).sort(([a],[b])=>a.localeCompare(b)).map(([date,ts])=><div key={date} style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:"#075985",marginBottom:8,padding:"6px 12px",background:"#F0F9FF",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>📅 {fmtDate(date)}</span>
              <span style={{fontSize:12,color:"#9CA3AF"}}>{ts.length} 項</span>
            </div>
            {ts.map(t=><TaskCard key={t.id} task={t} currentUser={cu} isManager={true} onConfirm={doCnf} onComplete={doCmp} onOverride={doOvr}/>)}
          </div>);
        })()}
      </div>}
      {tab==="more"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>{[["staff","員工管理"],["templates","範本庫"]].map(([k,l])=><button key={k} onClick={()=>setMoreTab(k)} style={{flex:1,padding:"10px",border:"1.5px solid "+(moreTab===k?MGR:"#E5E7EB"),borderRadius:8,background:moreTab===k?"#E8EAF6":"#fff",color:moreTab===k?MGR:"#6B7280",fontSize:14,fontWeight:moreTab===k?600:400}}>{l}</button>)}</div>
        {moreTab==="staff"&&<StaffMgr allUsers={users} onRefresh={loadU}/>}
        {moreTab==="templates"&&<TmplMgr currentUser={cu}/>}
      </div>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"#fff",borderTop:"0.5px solid #E5E7EB",display:"flex",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",padding:"8px 0 10px",color:tab===t.id?MGR:"#9CA3AF",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:t.id==="assign"?24:18,lineHeight:1}}>{t.icon}</span><span style={{fontSize:10,fontWeight:tab===t.id?600:400}}>{t.l}</span></button>)}
    </div>
  </div>;
}

// ── Staff App ──
function StaffApp({cu,onSignOut}){
  const[tab,setTab]=useState("mine");const[todayT,setTodayT]=useState([]);const[futureT,setFutureT]=useState([]);const[sched,setSched]=useState(null);const[online,setOnline]=useState(false);const[allUsers,setAllUsers]=useState({});const[showSet,setShowSet]=useState(false);
  useEffect(()=>{
    dbGet("users").then(v=>{if(v)setAllUsers(Object.fromEntries(Object.entries(v).map(([uid,d])=>[uid,{...d,uid}])));});
    dbGet("schedules/"+todayKey()).then(s=>setSched(s));
    db.ref(".info/connected").on("value",s=>setOnline(!!s.val()));
    const ref=db.ref("tasks/"+todayKey());ref.on("value",snap=>{const v=snap.val();setTodayT(v?Object.entries(v).map(([id,d])=>({...d,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);});
    const futureDates=getFutureDates(15).slice(1);
    Promise.all(futureDates.map(d=>dbGet("tasks/"+d).then(v=>v?Object.entries(v).map(([id,t])=>({...t,id,date:d})):[])))
      .then(res=>setFutureT(res.flat().filter(t=>t.assignedUids&&t.assignedUids[cu.uid])));
    return()=>{ref.off();db.ref(".info/connected").off();};
  },[]);
  const doCnf=(id,t)=>{const td=t.taskDate||t.date||todayKey();dbUpd("tasks/"+td+"/"+id,{status:"confirmed",confirmedBy:cu.uid,confirmedByName:cu.name,confirmedAt:Date.now()});};
  const doCmp=(id,t)=>{const td=t.taskDate||t.date||todayKey();const st=calcStatus(t);dbUpd("tasks/"+td+"/"+id,{status:"completed",completedBy:cu.uid,completedByName:cu.name,completedAt:Date.now(),overdueCompleted:st==="overdue"});};
  const myT=todayT.filter(t=>t.assignedUids&&!!t.assignedUids[cu.uid]);
  const myL=myT.map(t=>({...t,_st:calcStatus(t)}));const allL=todayT.map(t=>({...t,_st:calcStatus(t)}));
  const ovN=myL.filter(t=>t._st==="overdue").length,pN=myL.filter(t=>t._st==="pending").length;
  const tp={currentUser:cu,isManager:false,onConfirm:doCnf,onComplete:doCmp,onOverride:null};
  const futGrp={};futureT.forEach(t=>{const d=t.taskDate||t.date;if(!futGrp[d])futGrp[d]=[];futGrp[d].push(t);});
  const TABS=[{id:"mine",icon:"◉",l:"我的任務"},{id:"future",icon:"📅",l:"未來排程"},{id:"all",icon:"≡",l:"今日所有"},{id:"stats",icon:"📊",l:"我的統計"}];
  return<div style={{maxWidth:520,margin:"0 auto",paddingBottom:70,minHeight:"100vh",background:"#F0F4F0"}}>
    {showSet&&<SettingsOverlay currentUser={cu} onClose={()=>setShowSet(false)}/>}
    <div style={{background:PRIMARY,color:"#fff",padding:"13px 16px 11px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,opacity:0.7}}><Online on={online}/> 臻愛一生動物醫院</div><div style={{fontSize:16,fontWeight:600,marginTop:2}}>{cu.name}</div></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {ovN>0&&<Pill label={ovN+" 逾時"} color="#fff" bg="rgba(239,68,68,0.85)"/>}
          {pN>0&&<Pill label={pN+" 待確認"} color="#fff" bg="rgba(245,158,11,0.85)"/>}
          <button onClick={()=>setShowSet(true)} style={{fontSize:16,color:"rgba(255,255,255,0.7)",background:"none",border:"none",padding:"4px 6px"}}>⚙️</button>
          <button onClick={onSignOut} style={{fontSize:12,color:"rgba(255,255,255,0.6)",background:"none",border:"0.5px solid rgba(255,255,255,0.25)",borderRadius:6,padding:"4px 8px"}}>登出</button>
        </div>
      </div>
    </div>
    <div style={{padding:"14px 12px 0"}}>
      {tab==="mine"&&<div><SchedBar sched={sched} uid={cu.uid}/>
        {!myT.length?<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>✅</div><div style={{fontSize:15,fontWeight:500,color:"#374151"}}>今日暫無指派給你的任務</div></div>:<>
          <GS title="逾時未完成" tasks={myL.filter(t=>t._st==="overdue")} accent="#EF4444" {...tp}/>
          <GS title="待確認" tasks={myL.filter(t=>t._st==="pending")} accent="#F59E0B" {...tp}/>
          <GS title="執行中" tasks={myL.filter(t=>t._st==="confirmed")} accent="#3B82F6" {...tp}/>
          <GS title="已完成" tasks={myL.filter(t=>t._st==="completed")} accent="#10B981" {...tp}/>
        </>}
      </div>}
      {tab==="future"&&<div>
        <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:4}}>未來排程</div>
        <div style={{fontSize:13,color:"#9CA3AF",marginBottom:16}}>未來 14 天內指派給你的任務</div>
        {Object.keys(futGrp).length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>📅</div><div style={{fontSize:15,fontWeight:500,color:"#374151"}}>未來 14 天無排定任務</div></div>}
        {Object.entries(futGrp).sort(([a],[b])=>a.localeCompare(b)).map(([date,ts])=><div key={date} style={{marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#075985",marginBottom:8,padding:"6px 12px",background:"#F0F9FF",borderRadius:8}}>📅 {fmtDate(date)}</div>
          {ts.map(t=><TaskCard key={t.id} task={t} currentUser={cu} isManager={false} onConfirm={null} onComplete={null} onOverride={null}/>)}
        </div>)}
      </div>}
      {tab==="all"&&<div><SchedBar sched={sched} uid={cu.uid}/>
        {!todayT.length?<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF",fontSize:14}}>今日尚無任何任務</div>:<>
          <GS title="逾時未完成" tasks={allL.filter(t=>t._st==="overdue")} accent="#EF4444" currentUser={cu} isManager={false} onConfirm={null} onComplete={null} onOverride={null}/>
          <GS title="待確認" tasks={allL.filter(t=>t._st==="pending")} accent="#F59E0B" currentUser={cu} isManager={false} onConfirm={null} onComplete={null} onOverride={null}/>
          <GS title="執行中" tasks={allL.filter(t=>t._st==="confirmed")} accent="#3B82F6" currentUser={cu} isManager={false} onConfirm={null} onComplete={null} onOverride={null}/>
          <GS title="已完成" tasks={allL.filter(t=>t._st==="completed")} accent="#10B981" currentUser={cu} isManager={false} onConfirm={null} onComplete={null} onOverride={null}/>
        </>}
      </div>}
      {tab==="stats"&&<StatsView isManager={false} currentUser={cu} allUsers={allUsers}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"#fff",borderTop:"0.5px solid #E5E7EB",display:"flex",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",padding:"8px 0 10px",color:tab===t.id?PRIMARY:"#9CA3AF",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:18,lineHeight:1}}>{t.icon}</span><span style={{fontSize:10,fontWeight:tab===t.id?600:400}}>{t.l}</span></button>)}
    </div>
  </div>;
}

// ── Main App ──
function App(){
  const[state,setState]=useState("loading");const[fbu,setFbu]=useState(null);const[cu,setCu]=useState(null);
  const params=new URLSearchParams(window.location.search);const kioskP=params.get("kiosk");
  if(kioskP&&CONFIG_READY)return<KioskView label={kioskP==="1F"?"1F 櫃台看板":kioskP==="2F"?"2F 櫃台看板":kioskP}/>;
  useEffect(()=>{
    if(!CONFIG_READY||!fbAuth){setState("unauth");return;}
    const unsub=fbAuth.onAuthStateChanged(async f=>{
      if(!f){setState("unauth");setFbu(null);setCu(null);return;}
      setFbu(f);const data=await dbGet("users/"+f.uid);
      if(data){if(data.active===false){alert("你的帳號已被停用，請聯繫主管。");fbAuth.signOut();return;}setCu({...data,uid:f.uid});setState("authed");}
      else setState("registering");
    });
    return()=>unsub();
  },[]);
  const signOut=()=>fbAuth.signOut();
  if(!CONFIG_READY)return<SetupView/>;
  if(state==="loading")return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:12}}><div style={{fontSize:40}}>🐾</div><div style={{fontSize:14,color:"#9CA3AF"}}>載入中...</div></div>;
  if(state==="unauth")return<LoginView/>;
  if(state==="registering")return<RegisterView fbu={fbu} onRegistered={u=>{setCu(u);setState("authed");}}/>;
  if(state==="authed"&&cu)return cu.role==="manager"?<MgrApp cu={cu} onSignOut={signOut}/>:<StaffApp cu={cu} onSignOut={signOut}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
