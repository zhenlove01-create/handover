<script type="text/babel">
const{useState,useEffect,useRef}=React;
const PRIMARY="#0F6E56",MGR_COLOR="#1A237E";
const CATS={clinic:{l:"診所",c:"#991B1B",bg:"#FEF2F2"},hotel:{l:"旅館",c:"#92400E",bg:"#FFFBEB"},grooming:{l:"美容",c:"#5B21B6",bg:"#F5F3FF"},rehab:{l:"復健/泳池",c:"#075985",bg:"#F0F9FF"},cleaning:{l:"清潔",c:"#065F46",bg:"#ECFDF5"},admin:{l:"行政",c:"#374151",bg:"#F9FAFB"}};
const ST={pending:{l:"待確認",c:"#92400E",dot:"#F59E0B"},confirmed:{l:"執行中",c:"#1E40AF",dot:"#3B82F6"},completed:{l:"已完成",c:"#065F46",dot:"#10B981"},overdue:{l:"逾時",c:"#991B1B",dot:"#EF4444"}};
const DAY_TW=["日","一","二","三","四","五","六"];
const ASSIGN_OPTS=[{v:"shift_day",l:"早班全體"},{v:"shift_night",l:"晚班全體"},{v:"duty_day",l:"早班值日生"},{v:"duty_night",l:"晚班值日生"},{v:"person",l:"指定員工"},{v:"all",l:"所有人"}];

const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtDt=ts=>ts?new Date(ts).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
const fmtMin=ms=>{if(!ms||ms<0)return"—";const m=Math.round(ms/60000);return m<60?m+"分":Math.floor(m/60)+"時"+(m%60?m%60+"分":"");};
const fmtDate=d=>{const dt=new Date(d+"T00:00:00");return`${dt.getMonth()+1}/${dt.getDate()}（${DAY_TW[dt.getDay()]}）`;};

function calcStatus(t){
  if(!t)return"pending";
  if(t.status==="completed"||t.overdueOverride)return"completed";
  if(!t.deadline)return t.status||"pending";
  // 使用任務日期+截止時間計算逾時
  const taskDate=t.taskDate||todayKey();
  const[h,m]=t.deadline.split(":").map(Number);
  const dl=new Date(taskDate+"T00:00:00");dl.setHours(h,m,0,0);
  return new Date()>dl?"overdue":(t.status||"pending");
}

// 是否為逾時後完成（計入比例）：有 overdueCompleted 且沒有 overdueOverride
const isOverdueCompleted=t=>t&&t.overdueCompleted===true&&!t.overdueOverride;
// 是否為主管核准（不計入比例）
const isManagerApproved=t=>t&&!!t.overdueOverride;

function calcPersonStats(tasks,uid){
  const mine=tasks.filter(t=>t.assignedUids&&t.assignedUids[uid]);
  const total=mine.length;if(!total)return{total:0,completed:0,overdueCompleted:0,managerApproved:0,completionRate:0,overdueRate:0,avgTime:null};
  const completed=mine.filter(t=>t.status==="completed"||t.overdueOverride);
  const overdueC=mine.filter(isOverdueCompleted);
  const mgrApproved=mine.filter(isManagerApproved);
  const times=completed.filter(t=>t.completedAt&&t.createdAt).map(t=>t.completedAt-t.createdAt);
  return{total,completed:completed.length,overdueCompleted:overdueC.length,managerApproved:mgrApproved.length,completionRate:Math.round(completed.length/total*100),overdueRate:completed.length?Math.round(overdueC.length/completed.length*100):0,avgTime:times.length?times.reduce((a,b)=>a+b,0)/times.length:null};
}

function getDatesInRange(s,e){const d=[];let c=new Date(s+"T00:00:00");const ed=new Date(e+"T00:00:00");while(c<=ed){d.push(c.toISOString().slice(0,10));c.setDate(c.getDate()+1);}return d;}
function getWeekDates(off=0){const d=new Date();d.setDate(d.getDate()+off*7);const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-dow+(dow===0?-6:1));return Array.from({length:7},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd.toISOString().slice(0,10);});}
function getFutureDates(days=14){return Array.from({length:days},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10);});}

const dbGet=p=>db.ref(p).once("value").then(s=>s.val());
const dbSet=(p,v)=>db.ref(p).set(v);
const dbUpd=(p,v)=>db.ref(p).update(v);
const dbPush=(p,v)=>db.ref(p).push(v);
const dbDel=p=>db.ref(p).remove();

async function loadTasksRange(start,end){
  const dates=getDatesInRange(start,end);
  const results=await Promise.all(dates.map(d=>dbGet(`tasks/${d}`)));
  const all=[];results.forEach((day,i)=>{if(day)Object.entries(day).forEach(([id,t])=>all.push({...t,id,date:dates[i]}));});
  return all;
}

function SDot({status}){const s=ST[status]||ST.pending;return<span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:s.c,whiteSpace:"nowrap"}}><span style={{width:7,height:7,borderRadius:"50%",background:s.dot,display:"inline-block",flexShrink:0}}/>{s.l}</span>;}

      <label style={{fontSize:13,fontWeight:500,color:"#6B7280",display:"block",marginBottom:6}}>通知 Email</label>
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@gmail.com" type="email" style={{width:"100%",padding:"10px 12px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff",color:"#111",marginBottom:16}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:"12px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button>
        <button onClick={save} disabled={saving} style={{flex:2,padding:"12px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:14,fontWeight:600}}>{saving?"儲存中...":"儲存設定"}</button>
      </div>
    </div>

}

      </div>
      <div><div style={{fontSize:12,color:MGR_COLOR,fontWeight:600,marginBottom:4}}>🌙 晚班</div>
        {nm.length?nm.map(n=><div key={n} style={{fontSize:13,color:"#374151",display:"flex",alignItems:"center",gap:4,marginBottom:2}}>{n}{sched.night?.dutyOfficerName===n&&<span style={{fontSize:10,fontWeight:700,background:MGR_COLOR,color:"#fff",borderRadius:4,padding:"1px 5px"}}>值</span>}</div>):<div style={{fontSize:12,color:"#9CA3AF"}}>未排班</div>}
      </div>

// ── Task Card ──
function TaskCard({task,currentUser,isManager,onConfirm,onComplete,onOverride}){
  const[open,setOpen]=useState(false);const[orMode,setOrMode]=useState(false);const[orReason,setOrReason]=useState("");
  const st=calcStatus(task);
  const isOwn=task.assignedUids&&!!task.assignedUids[currentUser?.uid];
  const canAct=isOwn||isManager;
  const isToday=(task.taskDate||task.date||todayKey())===todayKey();
  const isFuture=(task.taskDate||task.date||todayKey())>todayKey();
  return<div style={{background:"#fff",border:`0.5px solid ${st==="overdue"?"#FECACA":"#E5E7EB"}`,borderLeft:`3px solid ${ST[st]?.dot||"#9CA3AF"}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
    <div style={{padding:"12px 14px",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,flexWrap:"wrap"}}>
            <Badge cat={task.category}/>
            {task.priority==="urgent"&&<Pill label="緊急" color="#991B1B" bg="#FEF2F2"/>}
            <SDot status={st}/>
            {isOverdueCompleted(task)&&<Pill label="⚠️ 逾時後完成" color="#92400E" bg="#FFFBEB"/>}
            {isManagerApproved(task)&&<Pill label="主管已核准" color="#1B5E20" bg="#E8F5E9"/>}
            {isFuture&&<Pill label={fmtDate(task.taskDate||task.date)} color="#075985" bg="#F0F9FF"/>}
          </div>
          <div style={{fontSize:15,fontWeight:500,color:"#111",lineHeight:1.4}}>{task.title}</div>
          <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#9CA3AF"}}>指派：{task.assignLabel}</span>
            {task.deadline&&<span style={{fontSize:12,color:st==="overdue"?"#991B1B":"#9CA3AF",fontWeight:st==="overdue"?600:400}}>截止 {task.deadline}</span>}
          </div>
        </div>
        <span style={{fontSize:11,color:"#9CA3AF",flexShrink:0}}>{open?"▲":"▼"}</span>
      </div>
    </div>
    {open&&<div style={{padding:"0 14px 14px",borderTop:"0.5px solid #F3F4F6"}}>
      {task.detail&&<p style={{fontSize:14,color:"#4B5563",margin:"10px 0",lineHeight:1.65}}>{task.detail}</p>}
      <div style={{fontSize:12,color:"#9CA3AF",display:"flex",flexDirection:"column",gap:3,marginBottom:12}}>
        {task.taskDate&&task.taskDate!==todayKey()&&<span style={{color:"#075985",fontWeight:500}}>執行日期：{fmtDate(task.taskDate)}</span>}
        <span>建立：{task.createdByName} · {fmtDt(task.createdAt)}</span>
        {task.confirmedByName&&<span>確認：{task.confirmedByName} · {fmtDt(task.confirmedAt)}</span>}
        {task.completedByName&&<span style={{color:isOverdueCompleted(task)?"#92400E":"#065F46",fontWeight:500}}>
          {isOverdueCompleted(task)?"⚠️ 逾時後完成":"完成"}：{task.completedByName} · {fmtDt(task.completedAt)}
        </span>}
        {task.overdueOverride&&<span style={{color:"#1B5E20"}}>核准：{task.overdueOverride.byName} — {task.overdueOverride.reason}</span>}
      </div>
      {!isFuture&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {canAct&&onConfirm&&(task.status==="pending"||!task.status)&&<button onClick={()=>onConfirm(task.id,task)} style={{flex:1,padding:"10px",background:"#1E40AF",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,minWidth:90}}>確認收到</button>}
        {canAct&&onComplete&&task.status==="confirmed"&&<button onClick={()=>onComplete(task.id,task)} style={{flex:1,padding:"10px",background:"#065F46",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:500,minWidth:90}}>標記完成</button>}
        {isManager&&st==="overdue"&&onOverride&&!orMode&&<button onClick={()=>setOrMode(true)} style={{padding:"10px 14px",background:"#FEF3C7",color:"#92400E",border:"0.5px solid #FDE68A",borderRadius:8,fontSize:13}}>核准逾時</button>}
      </div>}
      {isFuture&&<div style={{padding:"8px 12px",background:"#F0F9FF",borderRadius:8,fontSize:13,color:"#075985"}}>📅 此任務於 {fmtDate(task.taskDate||task.date)} 執行，到當天才能操作</div>}
      {orMode&&<div style={{marginTop:10,background:"#FFFDE7",border:"0.5px solid #FDE68A",borderRadius:8,padding:12}}>
        <div style={{fontSize:13,fontWeight:500,color:"#92400E",marginBottom:8}}>請說明核准原因（核准後不計入逾時比例）</div>
        <textarea value={orReason} onChange={e=>setOrReason(e.target.value)} rows={2} style={{width:"100%",padding:"8px",border:"0.5px solid #FDE68A",borderRadius:6,fontSize:13,background:"#fff"}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>{setOrMode(false);setOrReason("");}} style={{flex:1,padding:"8px",border:"0.5px solid #D1D5DB",borderRadius:6,background:"#fff",color:"#6B7280",fontSize:13}}>取消</button>
          <button onClick={()=>{if(!orReason.trim()){alert("請填寫原因");return;}onOverride(task.id,task,orReason);setOrMode(false);setOrReason("");}} style={{flex:2,padding:"8px",border:"none",borderRadius:6,background:"#D97706",color:"#fff",fontSize:13,fontWeight:500}}>確認核准（不計入逾時）</button>
        </div>
      </div>}
    </div>}
  </div>;
}

            {ov>0&&<span style={{fontSize:12,background:"#FEF2F2",color:"#991B1B",borderRadius:6,padding:"2px 8px",fontWeight:600}}>{ov}逾時</span>}
            {pend>0&&<span style={{fontSize:12,background:"#FFFBEB",color:"#92400E",borderRadius:6,padding:"2px 8px"}}>{pend}待確認</span>}

}

// ── Stats View ──
function StatsView({isManager,currentUser,allUsers}){
  const[start,setStart]=useState(()=>{const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().slice(0,10);});
  const[end,setEnd]=useState(todayKey);
  const[tasks,setTasks]=useState([]);const[loading,setLoading]=useState(false);const[selUid,setSelUid]=useState(isManager?"all":currentUser.uid);
  const staffList=Object.values(allUsers||{}).filter(u=>u.role!=="manager"&&u.active!==false);
  const load=async()=>{if(start>end){alert("開始日期不能晚於結束日期");return;}setLoading(true);const t=await loadTasksRange(start,end);setTasks(t);setLoading(false);};
  useEffect(()=>{load();},[]);
  const teamStats=staffList.map(u=>({...u,...calcPersonStats(tasks,u.uid)}));
  const teamAvg=teamStats.length?Math.round(teamStats.reduce((a,s)=>a+s.completionRate,0)/teamStats.length):0;
  const RateBar=({rate,color})=><div style={{background:"#F3F4F6",borderRadius:4,height:8,overflow:"hidden",marginTop:4}}><div style={{height:"100%",width:Math.min(rate,100)+"%",background:color||PRIMARY,borderRadius:4}}/></div>;
  const displayList=selUid==="all"?teamStats:[teamStats.find(u=>u.uid===selUid)||{...currentUser,...calcPersonStats(tasks,currentUser.uid)}].filter(Boolean);
  return<div>
    <div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:16}}>{isManager?"統計分析":"我的統計"}</div>
    <div style={{background:"#fff",border:"0.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:500,color:"#6B7280",marginBottom:10}}>選擇時間範圍</div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>開始</div><input type="date" value={start} onChange={e=>setStart(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff"}}/></div>
        <div style={{fontSize:14,color:"#9CA3AF",paddingTop:14}}>至</div>
        <div style={{flex:1,minWidth:120}}><div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>結束</div><input type="date" value={end} onChange={e=>setEnd(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff"}}/></div>
      </div>
      <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
        {[["7天",7],["14天",14],["30天",30]].map(([l,n])=><button key={n} onClick={()=>{const d=new Date();d.setDate(d.getDate()-(n-1));setStart(d.toISOString().slice(0,10));setEnd(todayKey());}} style={{padding:"6px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#F9FAFB",color:"#374151",fontSize:13}}>{l}</button>)}
        <button onClick={load} disabled={loading} style={{flex:1,padding:"6px 14px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:600}}>{loading?"載入中...":"查詢"}</button>
      </div>
    </div>
    {isManager&&<div style={{marginBottom:14}}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      <button onClick={()=>setSelUid("all")} style={{padding:"7px 14px",border:`1.5px solid ${selUid==="all"?MGR_COLOR:"#E5E7EB"}`,borderRadius:20,background:selUid==="all"?"#E8EAF6":"#fff",color:selUid==="all"?MGR_COLOR:"#6B7280",fontSize:13,fontWeight:selUid==="all"?600:400}}>全員對比</button>
      {staffList.map(u=><button key={u.uid} onClick={()=>setSelUid(u.uid)} style={{padding:"7px 14px",border:`1.5px solid ${selUid===u.uid?PRIMARY:"#E5E7EB"}`,borderRadius:20,background:selUid===u.uid?"#ECFDF5":"#fff",color:selUid===u.uid?PRIMARY:"#6B7280",fontSize:13,fontWeight:selUid===u.uid?600:400}}>{u.name}</button>)}
    </div></div>}
    {!loading&&tasks.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9CA3AF",fontSize:14}}>此時間段無任務記錄</div>}
    {isManager&&selUid==="all"&&tasks.length>0&&<><div style={{fontSize:13,fontWeight:600,color:"#9CA3AF",marginBottom:8}}>團隊整體</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <StatCard label="總任務數" value={tasks.length}/>
        <StatCard label="團隊平均完成率" value={teamAvg+"%"} color={teamAvg>=80?PRIMARY:teamAvg>=60?"#D97706":"#991B1B"}/>
        <StatCard label="逾時後完成（計入）" value={tasks.filter(isOverdueCompleted).length} color="#D97706"/>
        <StatCard label="主管核准（不計入）" value={tasks.filter(isManagerApproved).length} color="#065F46"/>
      </div>
    </>}
    {tasks.length>0&&<div>
      <div style={{fontSize:13,fontWeight:600,color:"#9CA3AF",marginBottom:8}}>{selUid==="all"?"各員工詳情":"個人統計"}</div>
      {displayList.map(s=>{
        const isMe=s.uid===currentUser.uid;const cr=s.completionRate||0;const or=s.overdueRate||0;
        return<div key={s.uid||"me"} style={{background:"#fff",border:`0.5px solid ${isMe?"#A7F3D0":"#E5E7EB"}`,borderRadius:10,padding:"14px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:15,fontWeight:600,color:"#111"}}>{s.name}{isMe&&<span style={{fontSize:11,background:"#ECFDF5",color:PRIMARY,borderRadius:4,padding:"2px 6px",marginLeft:6}}>我</span>}</div>
            <div style={{fontSize:24,fontWeight:700,color:cr>=80?PRIMARY:cr>=60?"#D97706":"#991B1B"}}>{cr}%</div>
          </div>
          <div style={{fontSize:11,color:"#9CA3AF",marginBottom:3}}>任務完成率</div>
          <RateBar rate={cr} color={cr>=80?PRIMARY:cr>=60?"#D97706":"#991B1B"}/>
          {isManager&&teamAvg>0&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:3,textAlign:"right"}}>團隊平均 {teamAvg}%</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>指派總數</div><div style={{fontSize:18,fontWeight:600}}>{s.total}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>完成數</div><div style={{fontSize:18,fontWeight:600,color:PRIMARY}}>{s.completed}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#9CA3AF"}}>逾時後完成</div><div style={{fontSize:18,fontWeight:600,color:or>0?"#D97706":"#9CA3AF"}}>{s.overdueCompleted}</div></div>
          </div>
          {/* 逾時比例 */}
          {s.completed>0&&<div style={{marginTop:10,background:"#FFFBEB",borderRadius:8,padding:"8px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:12,color:"#92400E",fontWeight:500}}>逾時後完成比例（計入）</span>
              <span style={{fontSize:14,fontWeight:700,color:or>20?"#991B1B":or>10?"#D97706":"#065F46"}}>{or}%</span>
            </div>
            <div style={{fontSize:11,color:"#9CA3AF"}}>{s.overdueCompleted} 筆逾時後完成 / {s.completed} 筆完成總數</div>
            <RateBar rate={or} color={or>20?"#EF4444":or>10?"#F59E0B":"#10B981"}/>
          </div>}
          {/* 主管核准（不計入） */}
          {(s.managerApproved||0)>0&&<div style={{marginTop:8,background:"#ECFDF5",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#065F46"}}>主管核准（不計入逾時比例）</span>
            <span style={{fontSize:14,fontWeight:600,color:"#065F46"}}>{s.managerApproved} 筆</span>
          </div>}
          <div style={{marginTop:10,paddingTop:10,borderTop:"0.5px solid #F3F4F6",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#9CA3AF"}}>平均完成時間</span>
            <span style={{fontSize:13,fontWeight:500,color:"#1E40AF"}}>{fmtMin(s.avgTime)}</span>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

// ── Template Manager ──
function TemplateManager({currentUser,onUseTemplate}){
  const[templates,setTemplates]=useState([]);const[showAdd,setShowAdd]=useState(false);const[showImport,setShowImport]=useState(false);
  const[form,setForm]=useState({title:"",detail:"",category:"clinic",priority:"normal",deadline:""});
  const[importText,setImportText]=useState("");const[importing,setImporting]=useState(false);
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  useEffect(()=>{const ref=db.ref("templates");ref.on("value",snap=>{const v=snap.val();setTemplates(v?Object.entries(v).map(([id,d])=>({...d,id})).sort((a,b)=>a.title.localeCompare(b.title,"zh-TW")):[]); });return()=>ref.off();},[]);
  const save=async()=>{if(!form.title.trim()){alert("請填寫範本名稱");return;}await dbPush("templates",{...form,deadline:form.deadline||null,createdBy:currentUser.uid,createdByName:currentUser.name,createdAt:Date.now()});setForm({title:"",detail:"",category:"clinic",priority:"normal",deadline:""});setShowAdd(false);};
  const del=async id=>{if(!confirm("確定刪除此範本？"))return;await dbDel(`templates/${id}`);};
  const doImport=async()=>{
    const lines=importText.trim().split("\n").filter(l=>l.trim());if(!lines.length){alert("請先貼上資料");return;}setImporting(true);let count=0;
    const catMap={"診所":"clinic","旅館":"hotel","美容":"grooming","復健":"rehab","泳池":"rehab","復健/泳池":"rehab","清潔":"cleaning","行政":"admin"};
    for(const line of lines){const parts=line.split("\t");if(!parts[0]?.trim())continue;const title=parts[0].trim();const rawCat=(parts[1]||"").trim();const category=catMap[rawCat]||"admin";const priority=(parts[2]||"").trim()==="緊急"?"urgent":"normal";const deadline=(parts[3]||"").trim()||null;const detail=(parts[4]||"").trim()||"";await dbPush("templates",{title,category,priority,deadline,detail,createdBy:currentUser.uid,createdByName:currentUser.name,createdAt:Date.now()});count++;}
    setImporting(false);setImportText("");setShowImport(false);alert(`已成功匯入 ${count} 筆範本！`);
  };
  const inp={width:"100%",padding:"9px 12px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:14,background:"#fff",color:"#111"};
  const lbl={fontSize:12,fontWeight:500,color:"#6B7280",display:"block",marginBottom:5};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:17,fontWeight:600,color:"#111"}}>範本庫</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setShowImport(o=>!o);setShowAdd(false);}} style={{padding:"8px 12px",border:`1.5px solid ${showImport?"#D97706":"#D1D5DB"}`,borderRadius:8,background:showImport?"#FFFBEB":"#fff",color:showImport?"#D97706":"#6B7280",fontSize:13}}>批次匯入</button>
        <button onClick={()=>{setShowAdd(o=>!o);setShowImport(false);}} style={{padding:"8px 12px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:500}}>+ 新增</button>
      </div>
    </div>
    {showImport&&<div style={{background:"#FFFBEB",border:"0.5px solid #FDE68A",borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:600,color:"#92400E",marginBottom:8}}>從 Google Sheets 批次匯入</div>
      <div style={{fontSize:12,color:"#92400E",lineHeight:1.7,marginBottom:10}}>五欄格式（Tab 分隔）：<strong>任務名稱｜部門｜優先｜截止時間｜說明</strong></div>
      <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={6} placeholder={"住宿房間清潔\t清潔\t一般\t10:00\t每日清潔住宿房間\n候診區打掃\t清潔\t一般\t09:30\t"} style={{...inp,minHeight:110,fontFamily:"monospace",fontSize:13,marginBottom:10}}/>
      <div style={{display:"flex",gap:8}}><button onClick={()=>{setShowImport(false);setImportText("");}} style={{flex:1,padding:"9px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button><button onClick={doImport} disabled={importing||!importText.trim()} style={{flex:2,padding:"9px",border:"none",borderRadius:8,background:"#D97706",color:"#fff",fontSize:14,fontWeight:600}}>{importing?"匯入中...":"確認匯入"}</button></div>
    </div>}
    {showAdd&&<div style={{background:"#F9FAFB",border:"0.5px solid #E5E7EB",borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{marginBottom:10}}><label style={lbl}>範本名稱 *</label><input value={form.title} onChange={e=>up("title",e.target.value)} placeholder="例：住宿房間清潔" style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lbl}>詳細說明</label><textarea value={form.detail} onChange={e=>up("detail",e.target.value)} rows={2} style={{...inp,minHeight:60}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div><label style={lbl}>部門</label><select value={form.category} onChange={e=>up("category",e.target.value)} style={inp}>{Object.entries(CATS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>
        <div><label style={lbl}>優先</label><select value={form.priority} onChange={e=>up("priority",e.target.value)} style={inp}><option value="normal">一般</option><option value="urgent">緊急</option></select></div>
      </div>
      <div style={{marginBottom:12}}><label style={lbl}>預設截止時間（選填）</label><input type="time" value={form.deadline} onChange={e=>up("deadline",e.target.value)} style={{...inp,width:"auto"}}/></div>
      <div style={{display:"flex",gap:8}}><button onClick={()=>setShowAdd(false)} style={{flex:1,padding:"9px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button><button onClick={save} style={{flex:2,padding:"9px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:14,fontWeight:600}}>儲存範本</button></div>
    </div>}
    {!templates.length&&!showAdd&&!showImport&&<div style={{textAlign:"center",padding:"40px 20px",color:"#9CA3AF",fontSize:14}}>尚無範本，點「新增」或「批次匯入」建立</div>}
    {templates.map(t=><div key={t.id} style={{background:"#fff",border:"0.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1}}><div style={{display:"flex",gap:6,marginBottom:5,flexWrap:"wrap"}}><Badge cat={t.category}/>{t.priority==="urgent"&&<Pill label="緊急" color="#991B1B" bg="#FEF2F2"/>}{t.deadline&&<span style={{fontSize:11,color:"#9CA3AF",background:"#F3F4F6",borderRadius:8,padding:"2px 8px"}}>截止 {t.deadline}</span>}</div>
          <div style={{fontSize:14,fontWeight:500,color:"#111"}}>{t.title}</div>{t.detail&&<div style={{fontSize:12,color:"#9CA3AF",marginTop:3}}>{t.detail}</div>}
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>{onUseTemplate&&<button onClick={()=>onUseTemplate(t)} style={{padding:"7px 12px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:13,fontWeight:500}}>使用</button>}<button onClick={()=>del(t.id)} style={{padding:"7px 10px",border:"0.5px solid #FECACA",borderRadius:8,background:"#FEF2F2",color:"#991B1B",fontSize:13}}>刪</button></div>
      </div>
    </div>)}
  </div>;
}

// ── Assign View ──
function AssignView({currentUser,allUsers,onDone}){
  const[form,setForm]=useState({title:"",detail:"",category:"clinic",priority:"normal",taskDate:todayKey(),deadline:"",assignType:"shift_day",personUid:""});
  const[sched,setSched]=useState(null);const[saving,setSaving]=useState(false);const[showTmpl,setShowTmpl]=useState(false);
  const up=(k,v)=>setForm(p=>({...p,[k]:v}));
  useEffect(()=>{dbGet(`schedules/${todayKey()}`).then(s=>setSched(s));},[]);

  const resolveAssign=()=>{
    const t=form.assignType,s=sched;
    if(t==="shift_day"){const u={};Object.entries(s?.day?.members||{}).forEach(([uid])=>{u[uid]=true;});return{uids:u,label:`早班全體（${Object.values(s?.day?.members||{}).join("、")||"無排班"}）`};}
    if(t==="shift_night"){const u={};Object.entries(s?.night?.members||{}).forEach(([uid])=>{u[uid]=true;});return{uids:u,label:`晚班全體（${Object.values(s?.night?.members||{}).join("、")||"無排班"}）`};}
    if(t==="duty_day"){const uid=s?.day?.dutyOfficer;return{uids:uid?{[uid]:true}:{},label:`早班值日生（${s?.day?.dutyOfficerName||"未設定"}）`};}
    if(t==="duty_night"){const uid=s?.night?.dutyOfficer;return{uids:uid?{[uid]:true}:{},label:`晚班值日生（${s?.night?.dutyOfficerName||"未設定"}）`};}
    if(t==="person"){const u=allUsers[form.personUid];return{uids:form.personUid?{[form.personUid]:true}:{},label:u?.name||"請選擇員工"};}
    if(t==="all"){const u={};Object.keys(allUsers).forEach(uid=>{u[uid]=true;});return{uids:u,label:"所有員工"};}
    return{uids:{},label:""};
  };

  const submit=async()=>{
    if(!form.title.trim()){alert("請填寫任務標題");return;}
    const{uids,label}=resolveAssign();
    if(!Object.keys(uids).length&&form.assignType!=="all"){alert("指派對象無人，請先設定今日排班");return;}
    setSaving(true);
    const taskKey=await dbPush(`tasks/${form.taskDate}`,{title:form.title.trim(),detail:form.detail.trim(),category:form.category,priority:form.priority,deadline:form.deadline||null,taskDate:form.taskDate,assignType:form.assignType,assignLabel:label,assignedUids:uids,date:form.taskDate,createdBy:currentUser.uid,createdByName:currentUser.name,createdAt:Date.now(),status:"pending",confirmedBy:null,confirmedByName:null,confirmedAt:null,completedBy:null,completedByName:null,completedAt:null,overdueCompleted:false,overdueOverride:null});
    await dbSet(`notifications/${taskKey.key}`,{title:form.title.trim(),assignLabel:label,deadline:form.deadline||null,taskDate:form.taskDate,createdByName:currentUser.name,createdAt:Date.now(),sent:false,assignedUids:uids});
    setSaving(false);
    setForm({title:"",detail:"",category:"clinic",priority:"normal",taskDate:todayKey(),deadline:"",assignType:"shift_day",personUid:""});
    alert("任務已指派！");onDone&&onDone();
  };

  const{label:ap}=resolveAssign();const isFuture=form.taskDate>todayKey();
  const inp={width:"100%",padding:"10px 12px",border:"0.5px solid #D1D5DB",borderRadius:8,fontSize:15,background:"#fff",color:"#111"};
  const lbl={fontSize:13,fontWeight:500,color:"#6B7280",display:"block",marginBottom:6};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:17,fontWeight:600,color:"#111"}}>指派任務</div>
      <button onClick={()=>setShowTmpl(o=>!o)} style={{padding:"8px 12px",border:`1.5px solid ${showTmpl?PRIMARY:"#D1D5DB"}`,borderRadius:8,background:showTmpl?"#ECFDF5":"#fff",color:showTmpl?PRIMARY:"#6B7280",fontSize:13}}>📋 {showTmpl?"關閉範本":"從範本選取"}</button>
    </div>
    {showTmpl&&<TemplateManager currentUser={currentUser} onUseTemplate={t=>{setForm(p=>({...p,title:t.title,detail:t.detail||"",category:t.category,priority:t.priority,deadline:t.deadline||""}));setShowTmpl(false);}}/>}
    {!showTmpl&&<>
      <div style={{marginBottom:14}}><span style={lbl}>部門類別</span><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{Object.entries(CATS).map(([k,v])=><button key={k} onClick={()=>up("category",k)} style={{padding:"9px 4px",border:`1.5px solid ${form.category===k?v.c:"#E5E7EB"}`,borderRadius:8,background:form.category===k?v.bg:"#fff",color:form.category===k?v.c:"#6B7280",fontSize:13,fontWeight:form.category===k?600:400}}>{v.l}</button>)}</div></div>
      <div style={{marginBottom:14}}><span style={lbl}>優先程度</span><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[["normal","一般"],["urgent","緊急"]].map(([k,l])=><button key={k} onClick={()=>up("priority",k)} style={{padding:"10px",border:`1.5px solid ${form.priority===k?(k==="urgent"?"#991B1B":PRIMARY):"#E5E7EB"}`,borderRadius:8,background:form.priority===k?(k==="urgent"?"#FEF2F2":"#ECFDF5"):"#fff",color:form.priority===k?(k==="urgent"?"#991B1B":PRIMARY):"#6B7280",fontSize:14,fontWeight:form.priority===k?600:400}}>{l}</button>)}</div></div>
      <div style={{marginBottom:14}}><label style={lbl}>任務標題 *</label><input value={form.title} onChange={e=>up("title",e.target.value)} placeholder="請簡短說明任務內容" style={inp}/></div>
      <div style={{marginBottom:14}}><label style={lbl}>詳細說明</label><textarea value={form.detail} onChange={e=>up("detail",e.target.value)} rows={3} style={{...inp,minHeight:76}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        <div><label style={lbl}>執行日期</label><input type="date" value={form.taskDate} onChange={e=>up("taskDate",e.target.value)} min={todayKey()} style={inp}/></div>
        <div><label style={lbl}>截止時間（選填）</label><input type="time" value={form.deadline} onChange={e=>up("deadline",e.target.value)} style={inp}/></div>
      </div>
      {isFuture&&<div style={{background:"#F0F9FF",border:"0.5px solid #BAE6FD",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:13,color:"#075985"}}>📅 此任務排定於 {fmtDate(form.taskDate)} 執行，員工會在「未來排程」中看到</div>}
      <div style={{marginBottom:20}}><span style={lbl}>指派對象</span>

// ── Schedule Manager ──
function ScheduleManager({allUsers}){
  const[weekOff,setWeekOff]=useState(0);const[editDay,setEditDay]=useState(null);const[sched,setSched]=useState({});
  const weekDates=getWeekDates(weekOff);const staffList=Object.values(allUsers).filter(u=>u.active!==false);
  useEffect(()=>{Promise.all(weekDates.map(d=>dbGet(`schedules/${d}`).then(v=>[d,v]))).then(res=>{const m={};res.forEach(([d,v])=>{if(v)m[d]=v;});setSched(m);});},[weekOff]);
  const DayEditor=({date})=>{
    const[day,setDay]=useState({members:{},dutyOfficer:null,dutyOfficerName:""});const[night,setNight]=useState({members:{},dutyOfficer:null,dutyOfficerName:""});const[saving,setSaving]=useState(false);
    useEffect(()=>{if(sched[date]?.day)setDay(sched[date].day);if(sched[date]?.night)setNight(sched[date].night);},[date]);
    const toggle=(shift,uid,name)=>{const setter=shift==="day"?setDay:setNight;setter(p=>{const m={...p.members};if(m[uid]){delete m[uid];return{...p,members:m,dutyOfficer:p.dutyOfficer===uid?null:p.dutyOfficer,dutyOfficerName:p.dutyOfficer===uid?"":p.dutyOfficerName};}m[uid]=name;return{...p,members:m};});};
    const setDuty=(shift,uid,name)=>{const setter=shift==="day"?setDay:setNight;setter(p=>({...p,dutyOfficer:p.dutyOfficer===uid?null:uid,dutyOfficerName:p.dutyOfficer===uid?"":name}));};
    const save=async()=>{setSaving(true);const data={day,night};await dbSet(`schedules/${date}`,data);setSched(p=>({...p,[date]:data}));setSaving(false);setEditDay(null);};
    const SR=({shift,data,label,color})=><div style={{marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color,marginBottom:8}}>{label}</div><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>{staffList.map(u=>{const on=!!data.members[u.uid];return<button key={u.uid} onClick={()=>toggle(shift,u.uid,u.name)} style={{padding:"7px 12px",border:`1.5px solid ${on?color:"#E5E7EB"}`,borderRadius:20,background:on?"#ECFDF5":"#fff",color:on?color:"#6B7280",fontSize:13,fontWeight:on?600:400}}>{u.name}</button>;})}</div>{Object.keys(data.members).length>0&&<><div style={{fontSize:12,color:"#9CA3AF",marginBottom:6}}>值日生</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{Object.entries(data.members).map(([uid,name])=><button key={uid} onClick={()=>setDuty(shift,uid,name)} style={{padding:"7px 12px",border:`1.5px solid ${data.dutyOfficer===uid?MGR_COLOR:"#E5E7EB"}`,borderRadius:20,background:data.dutyOfficer===uid?"#E8EAF6":"#fff",color:data.dutyOfficer===uid?MGR_COLOR:"#6B7280",fontSize:13,fontWeight:data.dutyOfficer===uid?600:400}}>{data.dutyOfficer===uid?"⭐ ":""}{name}</button>)}</div></>}</div>;
    return<div style={{background:"#F9FAFB",border:"0.5px solid #E5E7EB",borderRadius:10,padding:14,marginTop:8}}><SR shift="day" data={day} label="🌅 早班" color="#1565C0"/><SR shift="night" data={night} label="🌙 晚班" color={MGR_COLOR}/><div style={{display:"flex",gap:8}}><button onClick={()=>setEditDay(null)} style={{flex:1,padding:"10px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#6B7280",fontSize:14}}>取消</button><button onClick={save} disabled={saving} style={{flex:2,padding:"10px",border:"none",borderRadius:8,background:PRIMARY,color:"#fff",fontSize:14,fontWeight:600}}>{saving?"儲存中...":"儲存排班"}</button></div></div>;
  };
  return<div><div style={{fontSize:17,fontWeight:600,color:"#111",marginBottom:4}}>排班管理</div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><button onClick={()=>setWeekOff(o=>o-1)} style={{padding:"7px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#374151",fontSize:14}}>‹ 上週</button><div style={{fontSize:13,color:"#6B7280"}}>{weekDates[0].slice(5).replace("-","/")} – {weekDates[6].slice(5).replace("-","/")}</div><button onClick={()=>setWeekOff(o=>o+1)} style={{padding:"7px 14px",border:"0.5px solid #D1D5DB",borderRadius:8,background:"#fff",color:"#374151",fontSize:14}}>下週 ›</button></div>
    {weekDates.map(date=>{const d=sched[date];const isT=date===todayKey();return<div key={date} style={{marginBottom:8}}><div style={{background:"#fff",border:`0.5px solid ${isT?PRIMARY:"#E5E7EB"}`,borderRadius:10,overflow:"hidden"}}><div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:isT?"#ECFDF5":"#fff",cursor:"pointer"}} onClick={()=>setEditDay(editDay===date?null:date)}><div><div style={{fontSize:14,fontWeight:600,color:isT?PRIMARY:"#111"}}>{isT?"📍 ":""}{fmtDate(date)}</div><div style={{fontSize:12,color:"#9CA3AF",marginTop:2,display:"flex",gap:10}}><span>🌅 {Object.values(d?.day?.members||{}).join("、")||"未排班"}{d?.day?.dutyOfficerName?` (值:${d.day.dutyOfficerName})`:""}</span><span>🌙 {Object.values(d?.night?.members||{}).join("、")||"未排班"}{d?.night?.dutyOfficerName?` (值:${d.night.dutyOfficerName})`:""}</span></div></div><span style={{fontSize:12,color:"#9CA3AF"}}>{editDay===date?"▲":"▼"}</span></div>{editDay===date&&<div style={{padding:"0 12px 12px"}}><DayEditor date={date}/></div>}</div></div>;})}
  </div>;
}

function KioskView({floorLabel}){
  const[tasks,setTasks]=useState([]);const[users,setUsers]=useState({});const[sched,setSched]=useState(null);const[time,setTime]=useState(new Date());
  useEffect(()=>{
    const t=setInterval(()=>setTime(new Date()),30000);
    dbGet("users").then(v=>{if(v)setUsers(Object.fromEntries(Object.entries(v).map(([uid,d])=>[uid,{...d,uid}])));});
    dbGet(`schedules/${todayKey()}`).then(s=>setSched(s));
    const ref=db.ref(`tasks/${todayKey()}`);
    ref.on("value",snap=>{const v=snap.val();setTasks(v?Object.entries(v).map(([id,d])=>({...d,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);});
    return()=>{clearInterval(t);ref.off();};

            </div>
          </div>
          {!mine.length&&<div style={{fontSize:13,color:"#64748B",textAlign:"center",padding:"12px 0"}}>今日無任務</div>}
          {[...ov,...pend,...conf,...done].map(t=><div key={t.id} style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}>

            </div>
            {t.deadline&&<div style={{fontSize:11,color:"#64748B",flexShrink:0}}>截止 {t.deadline}</div>}
          </div>)}
        </div>;
      })}
    </div>
  </div>;
}

        {!tasks.length&&<div style={{textAlign:"center",padding:"50px 20px",color:"#9CA3AF"}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div style={{fontSize:15,fontWeight:500,color:"#374151"}}>今日尚無任務</div></div>}
      </div>}
      {tab==="assign"&&<AssignView currentUser={currentUser} allUsers={users} onDone={()=>setTab("today")}/>}

      {tab==="more"&&<div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>{[["staff","員工管理"],["templates","範本庫"]].map(([k,l])=><button key={k} onClick={()=>setMoreTab(k)} style={{flex:1,padding:"10px",border:`1.5px solid ${moreTab===k?MGR_COLOR:"#E5E7EB"}`,borderRadius:8,background:moreTab===k?"#E8EAF6":"#fff",color:moreTab===k?MGR_COLOR:"#6B7280",fontSize:14,fontWeight:moreTab===k?600:400}}>{l}</button>)}</div>
        {moreTab==="staff"&&<StaffManager allUsers={users} onRefresh={loadUsers}/>}
        {moreTab==="templates"&&<TemplateManager currentUser={currentUser}/>}
      </div>}
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"#fff",borderTop:"0.5px solid #E5E7EB",display:"flex",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",padding:"8px 0 10px",color:tab===t.id?MGR_COLOR:"#9CA3AF",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:t.id==="assign"?24:18,lineHeight:1}}>{t.icon}</span><span style={{fontSize:10,fontWeight:tab===t.id?600:400}}>{t.label}</span></button>)}
    </div>
  </div>;
}
